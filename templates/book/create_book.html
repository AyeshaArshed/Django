<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Book</title>
<style>

    .form-container {
        max-width: 500px;
        margin: 40px auto;
        padding: 30px;
        border-radius: 12px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #111827;
    }

    .form-field {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
    }
    .form-field label {
        margin-bottom: 6px;
        font-weight: 500;
        color: #374151;
    }
    .form-field input,
    .form-field textarea,
    .form-field select {
        padding: 10px 12px;
        font-size: 1rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    .form-field input:focus,
    .form-field textarea:focus,
    .form-field select:focus {
        border-color: #2563eb;
        outline: none;
        box-shadow: 0 0 5px #2563eb40;
    }

    button {
        background-color: #2563eb;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        width: 100%;
        transition: all 0.3s ease;
    }
    button:hover {
        background-color: #1d4ed8;
    }

    .back-link {
        display: block;
        margin-top: 20px;
        text-align: center;
        color: #2563eb;
        text-decoration: none;
        font-weight: 500;
    }
    .back-link:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

{% extends 'book/base.html' %}
{% block content %}
<div class="form-container">
    <h1>Add Book</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-field">
            {{ field.label_tag }}
            {{ field }}
            {% if field.errors %}
                <span style="color: red; font-size: 0.9rem;">{{ field.errors }}</span>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit">Submit</button>
    </form>
    <a class="back-link" href="{% url 'list_book' %}">Back to list</a>
</div>
{% endblock %}

</body>
</html>
