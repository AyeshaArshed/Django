<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <style>
.detail-container {
    max-width: 700px;
    margin: 40px auto;
    padding: 30px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.detail-container h1 {
    margin: 0;
    font-size: 2rem;
    color: #1f2937;
    text-align: center;
}

.book-image {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 20px;
}

.book-info p {
    margin: 6px 0;
    color: #374151;
    font-size: 1rem;
}

.book-info .author,
.book-info .published {
    font-weight: 500;
    color: #6b7280;
}

.action-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.action-buttons a {
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 500;
    transition: all 0.3s ease;
    color: white;
}

.edit-btn {
    background-color: #2563eb;
}

.edit-btn:hover {
    background-color: #1d4ed8;
}

.delete-btn {
    background-color: #dc2626;
}

.delete-btn:hover {
    background-color: #b91c1c;
}
</style>
</head>
<body>

{% extends 'book/base.html' %}

{% block content %}
<div class="detail-container">
    {% if book.image %}
        <img class="book-image" src="{{ book.image.url }}" alt="{{ book.title }}">
    {% else %}
        <img class="book-image" src="https://via.placeholder.com/600x400?text=No+Image" alt="No Image">
    {% endif %}
    <h1>{{ book.title }}</h1>
    <div class="book-info">
        <p class="author"><strong>Author:</strong> {{ book.author }}</p>
        <p class="published"><strong>Published:</strong> {{ book.published_date }}</p>
        <p class="description">{{ book.description }}</p>
    </div>
    <div class="action-buttons">
        <a href="{% url 'update_book' book.id %}" class="edit-btn">Edit</a>
        <a href="{% url 'delete_book' book.id %}" class="delete-btn">Delete</a>
    </div>
</div>
{% endblock %}

</body>
</html>
