<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>delete book</title>
</head>
<body>
{% extends 'book/base.html' %}
{% block content %}

<h1>Delete Book</h1>
<p>Are you sure you want to delete "{{ object.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>
<a href="{% url 'list_book' %}">Cancel</a>
{% endblock %}
</body>
</html>
