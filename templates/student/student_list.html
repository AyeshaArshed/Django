<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <style>
        table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #2563eb;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f3f3f3;
        }
        tr:hover {
            background-color: #e2e8f0;
        }
        caption {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <table>
        <caption>Student List</caption>
        <tr>
            <th>Student_Id</th>
            <th>Name</th>
            <th>Roll No</th>
            <th>Class Room</th>
        </tr>
        {% for student in student_data %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.roll_no }}</td>
            <td>{{ student.class_room }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" style="text-align:center;">No students found.</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
